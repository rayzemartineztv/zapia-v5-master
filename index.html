<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA OS — CRM MASTER v5.8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #app-container { height: 100%; display: flex; flex-direction: column; }
        
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; align-items: center; justify-content: space-between; z-index: 1000; position: relative; }
        #header-title { font-weight: bold; color: #e74c3c; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        #sync-status { font-size: 7px; color: #0f8; margin-top: 2px; text-transform: uppercase; text-align: center; }

        #cat-menu { background: #0a0a0a; display: flex; overflow-x: auto; padding: 12px 10px; gap: 8px; border-bottom: 1px solid #222; }
        .cat-item { background: transparent; padding: 6px 14px; border-radius: 15px; font-size: 11px; color: #888; border: 1px solid #333; white-space: nowrap; cursor: pointer; }
        .cat-item.active { color: #e74c3c; border-color: #e74c3c; background: #e74c3c11; }

        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050505; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-title { font-size: 13px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; color: #e74c3c; }

        /* ACORDEÓN DE LEADS */
        .lead-group-header { background: #1a1a1a; padding: 12px; font-size: 11px; font-weight: bold; color: #e74c3c; border-bottom: 1px solid #333; display: flex; justify-content: space-between; margin-top: 10px; border-radius: 8px 8px 0 0; }
        
        .lead-card { background: #111; border: 1px solid #222; margin-bottom: 2px; overflow: hidden; transition: 0.3s; }
        .lead-header-row { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .lead-header-row:active { background: #1a1a1a; }
        .lead-name { font-size: 13px; font-weight: bold; color: #fff; }
        .lead-brief { font-size: 10px; color: #666; }

        /* SUBMENÚ DESPLEGABLE (MAXIMIZADO) */
        .lead-details-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: #0a0a0a; }
        .lead-details-content.active { max-height: 1000px; padding: 20px; border-top: 1px solid #222; }

        .detail-row { margin-bottom: 15px; border-bottom: 1px solid #1a1a1a; padding-bottom: 10px; }
        .detail-label { font-size: 9px; color: #e74c3c; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        .detail-value { font-size: 12px; color: #ccc; }
        
        .circle-badge { background: #e74c3c22; color: #e74c3c; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; display: inline-block; margin-top: 5px; }

        .btn-wa { background: #25d366; color: #fff; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 13px; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        #input-bar { background: #111; padding: 12px 15px calc(25px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        #text-input { flex: 1; background: transparent; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div style="flex:1"></div>
            <div style="text-align:center">
                <div id="header-title">Zapia Master v5.8</div>
                <div id="sync-status">LEY N°0 ACTIVADA</div>
            </div>
            <div style="flex:1; text-align:right"><button class="header-btn" onclick="location.reload(true)" style="background:none; border:none; color:#666; font-size:18px;">↻</button></div>
        </header>

        <nav id="cat-menu">
            <div class="cat-item active" onclick="showView('leads-view', this)">🎯 Leads</div>
            <div class="cat-item" onclick="showView('finance-view', this)">💰 Finanzas</div>
            <div class="cat-item" onclick="showView('prop-view', this)">🏢 Propiedades</div>
            <div class="cat-item" onclick="showView('funados-view', this)">🚩 Funados</div>
        </nav>

        <main id="chat-area">
            <div id="leads-view" class="view-section active"><div id="leads-container"></div></div>
            <div id="finance-view" class="view-section">
                <div class="card"><div class="card-title">💰 UF</div><div style="font-size:24px; color:#f1c40f;">$ 37.950,23</div></div>
                <div class="card"><div class="card-title">🏦 Ejecutivos</div><div id="finance-execs"></div></div>
            </div>
            <div id="prop-view" class="view-section"><div class="card"><div class="card-title">🏢 Carteras</div><div id="prop-container"></div></div></div>
            <div id="funados-view" class="view-section"><div id="funados-container"></div></div>
        </main>

        <footer id="input-bar">
            <input type="text" id="text-input" placeholder="Zapia OS Master..." autocomplete="off">
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const resp = await fetch('logs.json?v=' + Date.now());
                const data = await resp.json();
                renderLeads(data.leads_v3.groups, data.funados || []);
                renderFinance(data.finance || {});
                renderProperties(data.properties || []);
                renderFunados(data.funados || []);
                document.getElementById('sync-status').innerText = 'ACORDEÓN MAX ACTIVADO - ' + data.last_sync;
            } catch(e) { }
        }

        function renderLeads(groups, funados) {
            const container = document.getElementById('leads-container'); container.innerHTML = '';
            for (const [cat, leads] of Object.entries(groups)) {
                if (leads.length === 0) continue;
                const groupHeader = document.createElement('div');
                groupHeader.className = 'lead-group-header';
                groupHeader.innerHTML = `<span>${cat.toUpperCase()}</span><span>${leads.length} REGISTROS</span>`;
                container.appendChild(groupHeader);

                leads.forEach(l => {
                    const isFunado = funados.some(f => l.name.toLowerCase().includes(f.name.toLowerCase()));
                    const card = document.createElement('div');
                    card.className = 'lead-card';
                    card.innerHTML = `
                        <div class="lead-header-row" onclick="toggleLead(this)">
                            <div>
                                <div class="lead-name">${l.name} ${isFunado ? '⚠️' : ''}</div>
                                <div class="lead-brief">${l.type} | ${l.status}</div>
                            </div>
                            <div style="color:#444">▼</div>
                        </div>
                        <div class="lead-details-content">
                            <div class="detail-row">
                                <div class="detail-label">Estado de Evolución</div>
                                <div class="detail-value" style="color:#0f8; font-weight:bold;">● ${l.status}</div>
                            </div>
                            <div class="detail-row">
                                <div class="detail-label">Círculo de Análisis 360</div>
                                <div class="circle-badge">⭕ ${l.circle}</div>
                            </div>
                            <div class="detail-row">
                                <div class="detail-label">Identificación WhatsApp (JID)</div>
                                <div class="detail-value">${l.jid}</div>
                            </div>
                            <div class="detail-row">
                                <div class="detail-label">Información de Registro</div>
                                <div class="detail-value">${l.full_data}</div>
                            </div>
                            <button class="btn-wa" onclick="window.open('https://wa.me/${l.phone.replace('+','').replace(/ /g,'')}')">
                                💬 INICIAR COMUNICACIÓN WHATSAPP
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        function toggleLead(el) {
            const content = el.nextElementSibling;
            const arrow = el.querySelector('div:last-child');
            const isActive = content.classList.contains('active');
            
            // Cerrar otros (opcional, pero ayuda al "orden integral")
            document.querySelectorAll('.lead-details-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.lead-header-row div:last-child').forEach(a => a.innerText = '▼');

            if (!isActive) {
                content.classList.add('active');
                arrow.innerText = '▲';
            }
        }

        function renderFinance(fin) {
            const container = document.getElementById('finance-execs'); container.innerHTML = '';
            (fin.execs || []).forEach(e => {
                const div = document.createElement('div'); div.className = 'card'; div.style.margin='5px 0';
                div.innerHTML = `<div style="font-size:11px;"><b>${e.name}</b> - ${e.bank} (${e.area})</div>`;
                container.appendChild(div);
            });
        }

        function renderProperties(props) {
            const container = document.getElementById('prop-container'); container.innerHTML = '';
            props.forEach(p => {
                const div = document.createElement('div'); div.style.padding='10px'; div.style.borderBottom='1px solid #222';
                div.innerHTML = `<div style="font-size:12px; font-weight:bold;">${p.title}</div><div style="font-size:10px; color:#888;">📂 Estatus: ${p.docs}</div>`;
                container.appendChild(div);
            });
        }

        function renderFunados(funados) {
            const container = document.getElementById('funados-container'); container.innerHTML = '';
            funados.forEach(f => {
                const div = document.createElement('div'); div.className = 'card'; div.style.borderColor='#ff4d4d';
                div.innerHTML = `<div style="color:#ff4d4d; font-weight:bold; font-size:13px;">${f.name}</div><div style="font-size:10px; color:#888; margin-top:5px;">Causa: ${f.reason}</div>`;
                container.appendChild(div);
            });
        }

        function showView(viewId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(el) {
                document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }
        loadData();
    </script>
</body>
</html>
