<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA MASTER V5 — PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #app-container { height: 100%; display: flex; flex-direction: column; }
        
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        .nav-group { display: flex; gap: 15px; align-items: center; }
        .nav-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #666; transition: 0.2s; }
        .nav-btn:active { color: #e74c3c; }
        #header-title { font-weight: bold; color: #e74c3c; font-size: 14px; text-transform: uppercase; position: absolute; left: 50%; transform: translateX(-50%); }

        #cat-menu { background: #0a0a0a; display: flex; overflow-x: auto; padding: 10px; gap: 8px; border-bottom: 1px solid #222; scrollbar-width: none; }
        .cat-item { background: transparent; padding: 6px 12px; border-radius: 15px; font-size: 12px; color: #888; border: 1px solid #333; white-space: nowrap; transition: 0.2s; }
        .cat-item.active { color: #e74c3c; border-color: #e74c3c; }

        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050505; -webkit-overflow-scrolling: touch; }
        .m { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .zap { align-self: flex-start; background: transparent; color: #0f8; border: 1px solid #333; }

        #input-bar { 
            background: #111; 
            padding: 12px 15px calc(25px + env(safe-area-inset-bottom)) 15px; 
            display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; z-index: 1000; 
        }
        #text-input { flex: 1; background: transparent; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        .action-btn { background: none; border: none; font-size: 24px; color: #aaa; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .action-btn:active { color: #e74c3c; }
        
        #build-stamp { position: absolute; top: 2px; right: 5px; font-size: 7px; color: #222; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="nav-group">
                <button class="nav-btn" onclick="location.reload()">🏠</button>
                <button class="nav-btn" onclick="history.back()">←</button>
                <button class="nav-btn" onclick="history.forward()">→</button>
            </div>
            <div id="header-title">Zapia Master V5</div>
            <button class="nav-btn" onclick="location.reload(true)">↻</button>
        </header>
        <nav id="cat-menu">
            <div class="cat-item active">🏠 Home</div>
            <div class="cat-item">⭕ Círculos</div>
            <div class="cat-item">🏢 Propiedades</div>
            <div class="cat-item">👤 Dueños</div>
            <div class="cat-item">🎯 Leads</div>
        </nav>
        <main id="chat-area">
            <div class="m zap">
                <b style="color:#e74c3c">ESTILO PRO RESTAURADO</b><br><br>
                Felipe, he vuelto a los fondos transparentes. Elegancia y sobriedad 100% recuperadas.
            </div>
        </main>
        <footer id="input-bar">
            <button class="action-btn">📎</button>
            <input type="text" id="text-input" placeholder="Orden rápida..." autocomplete="off">
            <button class="action-btn">🎤</button>
            <button class="action-btn" style="color:#e74c3c; font-size:28px">➤</button>
        </footer>
    </div>
</body>
</html>
