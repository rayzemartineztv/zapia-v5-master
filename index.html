<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA OS — CRM MASTER v5.9</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #app-container { height: 100%; display: flex; flex-direction: column; }
        
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; align-items: center; justify-content: space-between; z-index: 1000; position: relative; }
        #header-title { font-weight: bold; color: #e74c3c; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        #sync-status { font-size: 7px; color: #0f8; margin-top: 2px; text-transform: uppercase; text-align: center; }

        #cat-menu { background: #0a0a0a; display: flex; overflow-x: auto; padding: 12px 10px; gap: 8px; border-bottom: 1px solid #222; }
        .cat-item { background: transparent; padding: 6px 14px; border-radius: 15px; font-size: 11px; color: #888; border: 1px solid #333; white-space: nowrap; cursor: pointer; }
        .cat-item.active { color: #e74c3c; border-color: #e74c3c; background: #e74c3c11; }
        .cat-item.funados-btn { color: #ff4d4d; border-color: #ff4d4d; }

        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050505; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* LISTADO DE LEADS MEJORADO */
        .category-title { font-size: 14px; font-weight: bold; color: #fff; margin: 15px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .lead-card { background: #151515; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; overflow: hidden; }
        .lead-main-header { padding: 15px; cursor: pointer; }
        .lead-name-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .lead-name { font-size: 13px; font-weight: bold; color: #fff; flex: 1; line-height: 1.3; }
        .lead-id { font-size: 8px; color: #444; margin-left: 10px; }
        
        .badge-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .badge-status { background: #0f82; color: #0f8; font-size: 9px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .badge-circle { background: #e74c3c22; color: #e74c3c; font-size: 9px; padding: 3px 8px; border-radius: 4px; border: 1px solid #e74c3c44; }

        .lead-brief-info { font-size: 12px; color: #ccc; margin-bottom: 4px; }
        .lead-brief-info b { color: #fff; }

        /* DESPLIEGUE SUBMENÚ */
        .lead-extra-content { display: none; padding: 15px; background: #0c0c0c; border-top: 1px solid #222; }
        .lead-extra-content.active { display: block; }

        .info-block { margin-bottom: 15px; }
        .info-label { font-size: 10px; color: #e74c3c; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .info-value { font-size: 12px; color: #aaa; line-height: 1.5; background: #1a1a1a; padding: 10px; border-radius: 6px; border: 1px solid #222; }

        .btn-hablar { background: #e74c3c; color: #fff; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 5px; }
        .btn-hablar:active { background: #c0392b; }

        #input-bar { background: #111; padding: 12px 15px calc(25px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        #text-input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div style="flex:1"><button class="header-btn" onclick="showView('leads-view')" style="background:none; border:none; color:#666; font-size:18px">🏠</button></div>
            <div style="text-align:center">
                <div id="header-title">Zapia Master v5.9</div>
                <div id="sync-status">LEY N°0 PROTECTED</div>
            </div>
            <div style="flex:1; text-align:right"><button class="header-btn" onclick="location.reload(true)" style="background:none; border:none; color:#666; font-size:18px">↻</button></div>
        </header>

        <nav id="cat-menu">
            <div class="cat-item active" onclick="showView('leads-view', this)">🎯 Leads</div>
            <div class="cat-item" onclick="showView('prop-view', this)">🏢 Propiedades</div>
            <div class="cat-item" onclick="showView('finance-view', this)">💰 Finanzas</div>
            <div class="cat-item funados-btn" onclick="showView('funados-view', this)">🚩 Funados</div>
        </nav>

        <main id="chat-area">
            <div id="leads-view" class="view-section active"><div id="leads-container"></div></div>
            <div id="prop-view" class="view-section"><div id="prop-container"></div></div>
            <div id="finance-view" class="view-section">
                <div class="card"><div class="card-title">UF ACTUAL</div><div style="font-size:26px; color:#f1c40f; font-weight:bold;">$ 37.950,23</div></div>
                <div id="finance-container"></div>
            </div>
            <div id="funados-view" class="view-section"><div id="funados-container"></div></div>
        </main>

        <footer id="input-bar">
            <button style="background:none; border:none; color:#666; font-size:20px">📎</button>
            <input type="text" id="text-input" placeholder="Zapia OS Master..." autocomplete="off">
            <button style="background:none; border:none; color:#e74c3c; font-size:24px">➤</button>
        </footer>
    </div>

    <script>
        let funadosList = [];
        async function loadData() {
            try {
                const resp = await fetch('logs.json?v=' + Date.now());
                const data = await resp.json();
                funadosList = data.funados || [];
                renderLeads(data.leads_v3.groups);
                renderProperties(data.properties || []);
                renderFinance(data.finance || {});
                renderFunados(data.funados || []);
                document.getElementById('sync-status').innerText = 'CRM v5.9 ONLINE - ' + data.last_sync;
            } catch(e) { }
        }

        function renderLeads(groups) {
            const container = document.getElementById('leads-container'); container.innerHTML = '';
            for (const [cat, leads] of Object.entries(groups)) {
                if (leads.length === 0) continue;
                const catDiv = document.createElement('div');
                catDiv.className = 'category-title';
                catDiv.innerText = `${cat}${leads.length}`;
                container.appendChild(catDiv);

                leads.forEach(l => {
                    const isFunado = funadosList.some(f => l.name.toLowerCase().includes(f.name.toLowerCase()));
                    const card = document.createElement('div');
                    card.className = 'lead-card';
                    card.innerHTML = `
                        <div class="lead-main-header" onclick="toggleExtra(this)">
                            <div class="lead-name-row">
                                <div class="lead-name">${l.name} ${isFunado ? '⚠️' : ''}</div>
                                <div class="lead-id">ID: ${l.jid.split('@')[0]}</div>
                            </div>
                            <div class="badge-row">
                                <div class="badge-status">Evolucionando</div>
                                <div class="badge-circle">⭕ ${l.circle}</div>
                            </div>
                            <div class="lead-brief-info"><b>Tel:</b> ${l.phone}</div>
                            <div class="lead-brief-info"><b>Círculo:</b> ${l.circle}</div>
                        </div>
                        <div class="lead-extra-content">
                            <div class="info-block">
                                <div class="info-label">Información Completa</div>
                                <div class="info-value">| ${l.full_data} |</div>
                            </div>
                            <button class="btn-hablar" onclick="window.open('https://wa.me/${l.phone.replace('+','').replace(/ /g,'')}')">
                                HABLAR WHATSAPP
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        function toggleExtra(el) {
            const extra = el.nextElementSibling;
            const isActive = extra.classList.contains('active');
            document.querySelectorAll('.lead-extra-content').forEach(c => c.classList.remove('active'));
            if (!isActive) extra.classList.add('active');
        }

        function renderProperties(props) {
            const container = document.getElementById('prop-container'); container.innerHTML = '<div class="category-title">Cartera Activa</div>';
            props.forEach(p => {
                const div = document.createElement('div'); div.className = 'card';
                div.innerHTML = `<div style="font-size:13px; font-weight:bold;">${p.title}</div><div style="font-size:10px; color:#888; margin-top:5px;">VALOR: ${p.value} | ESTATUS: ${p.docs}</div>`;
                container.appendChild(div);
            });
        }

        function renderFinance(fin) {
            const container = document.getElementById('finance-container'); container.innerHTML = '';
            (fin.execs || []).forEach(e => {
                const div = document.createElement('div'); div.className = 'card';
                div.innerHTML = `<div style="font-size:12px;"><b>${e.name}</b><br><span style="color:#888; font-size:10px;">${e.bank} - ${e.area}</span></div>`;
                container.appendChild(div);
            });
        }

        function renderFunados(funados) {
            const container = document.getElementById('funados-container'); container.innerHTML = '<div class="category-title" style="color:#ff4d4d;">🚩 LISTA NEGRA</div>';
            funados.forEach(f => {
                const div = document.createElement('div'); div.className = 'lead-card'; div.style.borderColor='#ff4d4d'; div.style.padding='15px';
                div.innerHTML = `<div style="font-size:13px; font-weight:bold; color:#ff4d4d;">${f.name}</div><div style="font-size:10px; color:#888; margin-top:5px;">Causa: ${f.reason}</div>`;
                container.appendChild(div);
            });
        }

        function showView(viewId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(el) {
                document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }
        loadData();
    </script>
</body>
</html>
