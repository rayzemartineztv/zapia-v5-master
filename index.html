<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA MASTER V5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #app-container { height: 100%; display: flex; flex-direction: column; }
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        .nav-group { display: flex; gap: 15px; align-items: center; }
        .nav-btn { font-size: 18px; cursor: pointer; color: #666; }
        #header-title { font-weight: bold; color: #e74c3c; font-size: 14px; text-transform: uppercase; position: absolute; left: 50%; transform: translateX(-50%); }
        #cat-menu { background: #0a0a0a; display: flex; overflow-x: auto; padding: 10px; gap: 8px; border-bottom: 1px solid #222; scrollbar-width: none; }
        .cat-item { background: #1a1a1a; padding: 6px 12px; border-radius: 15px; font-size: 12px; color: #888; border: 1px solid #333; white-space: nowrap; }
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050505; -webkit-overflow-scrolling: touch; }
        #input-bar { background: #111; padding: 12px 15px calc(25px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; z-index: 1000; }
        #text-input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        #build-stamp { position: absolute; top: 2px; right: 5px; font-size: 7px; color: #222; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="nav-group">
                <span class="nav-btn" onclick="location.reload()">🏠</span>
                <span class="nav-btn" onclick="history.back()">←</span>
                <span class="nav-btn" onclick="history.forward()">→</span>
            </div>
            <div id="header-title">Zapia Master V5</div>
            <div class="nav-btn" onclick="location.reload(true)">↻</div>
        </header>
        <nav id="cat-menu">
            <div class="cat-item">🏠 Home</div>
            <div class="cat-item">⭕ Círculos</div>
            <div class="cat-item">🏢 Propiedades</div>
            <div class="cat-item">👤 Dueños</div>
            <div class="cat-item">🎯 Leads</div>
        </nav>
        <main id="chat-area">
            <div style="background:#111; padding:15px; border-radius:12px; border:1px solid #333; margin-bottom:10px">
                <b style="color:#e74c3c">PROTECCIÓN DE BARRA</b><br><br>
                Felipe, he blindado la barra inferior contra cualquier pisado del sistema.
            </div>
        </main>
        <footer id="input-bar">
            <button class="nav-btn">📎</button>
            <input type="text" id="text-input" placeholder="Orden rápida..." autocomplete="off">
            <button class="nav-btn">🎤</button>
            <button class="nav-btn" style="color:#e74c3c; font-size:28px">➤</button>
        </footer>
    </div>
</body>
</html>
