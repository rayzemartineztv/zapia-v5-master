<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA OS — CRM PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #app-container { height: 100%; display: flex; flex-direction: column; }
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; align-items: center; justify-content: space-between; z-index: 1000; position: relative; }
        .nav-group { display: flex; gap: 15px; align-items: center; }
        .header-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #666; transition: 0.2s; }
        #title-container { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
        #header-title { font-weight: bold; color: #e74c3c; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        #sync-status { font-size: 7px; color: #0f8; margin-top: 2px; text-transform: uppercase; }
        #cat-menu { background: #0a0a0a; display: flex; overflow-x: auto; padding: 12px 10px; gap: 8px; border-bottom: 1px solid #222; }
        .cat-item { background: transparent; padding: 6px 14px; border-radius: 15px; font-size: 11px; color: #888; border: 1px solid #333; white-space: nowrap; cursor: pointer; }
        .cat-item.active { color: #e74c3c; border-color: #e74c3c; background: #e74c3c11; }
        #search-container { background: #111; padding: 10px 15px; border-bottom: 1px solid #222; display: none; position: relative; }
        #search-container.active { display: block; }
        .search-box { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 10px 40px 10px 15px; border-radius: 20px; font-size: 14px; outline: none; }
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050505; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .category-block { margin-bottom: 15px; }
        .category-header { background: #111; padding: 12px 15px; border-radius: 8px; border-left: 4px solid #e74c3c; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .category-name { font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .category-count { font-size: 10px; background: #333; padding: 2px 8px; border-radius: 10px; }
        .leads-list { display: none; padding-top: 8px; }
        .leads-list.active { display: block; }
        .lead-card { background: #1a1a1a; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .lead-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; cursor: pointer; }
        .lead-name { font-size: 12px; font-weight: bold; color: #fff; }
        .lead-date { font-size: 9px; color: #666; }
        .lead-phone { font-size: 10px; color: #00d4ff; display: block; margin-bottom: 5px; }
        .lead-circle { font-size: 10px; background: #e74c3c33; color: #e74c3c; padding: 2px 6px; border-radius: 4px; display: inline-block; cursor: pointer; margin-right: 5px; }
        .lead-status { font-size: 9px; color: #0f8; font-weight: bold; text-transform: uppercase; }
        .lead-details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; font-size: 11px; color: #aaa; line-height: 1.4; }
        .lead-details.active { display: block; }
        #input-bar { background: #111; padding: 12px 15px calc(25px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        #text-input { flex: 1; background: transparent; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="nav-group"><button class="header-btn" onclick="showView('home-view')">🏠</button><button class="header-btn" onclick="toggleSearch()">🔍</button></div>
            <div id="title-container"><div id="header-title">Zapia OS — CRM</div><div id="sync-status">Sincronizando...</div></div>
            <div class="nav-group"><button class="header-btn" onclick="location.reload(true)">↻</button></div>
        </header>
        <div id="search-container"><input type="text" id="main-search" class="search-box" placeholder="Arriendo, Cóndores, Santiago..." oninput="handleSearch()"></div>
        <nav id="cat-menu">
            <div class="cat-item active" onclick="showView('home-view', this)">🏠 Home</div>
            <div class="cat-item" onclick="showView('leads-view', this)">🎯 Leads</div>
            <div class="cat-item" onclick="showView('circles-view', this)">⭕ Círculos</div>
        </nav>
        <main id="chat-area">
            <div id="home-view" class="view-section active"><div style="background:#111; padding:20px; border-radius:12px; border:1px solid #222;"><div style="font-size:16px; font-weight:bold; margin-bottom:10px;">Macro CRM Integral</div><div id="stats-summary" style="font-size:12px; color:#888;">Indexando bases Raizze + Felipe...</div></div></div>
            <div id="leads-view" class="view-section"><div id="leads-container"></div></div>
            <div id="circles-view" class="view-section"><div id="circles-container"></div></div>
        </main>
        <footer id="input-bar"><button class="header-btn">📎</button><input type="text" id="text-input" placeholder="CRM Master Online..." autocomplete="off"><button class="header-btn" style="color:#e74c3c; font-size:28px">➤</button></footer>
    </div>
    <script>
        let allLeads = [];
        let groupedLeads = {};
        async function loadData() {
            try {
                const resp = await fetch('logs.json?v=' + Date.now());
                const data = await resp.json();
                allLeads = Object.values(data.leads_v3.groups).flat();
                groupedLeads = data.leads_v3.groups;
                renderLeads(groupedLeads);
                renderCircles();
                document.getElementById('sync-status').innerText = 'LIVE CRM: ' + data.last_sync;
                document.getElementById('stats-summary').innerText = 'Red Unificada: Felipe + Raizze\nTotal: ' + data.leads_v3.stats.total + ' Leads\nSincronizado con KiteProp/Google';
            } catch(e) { document.getElementById('sync-status').innerText = 'SYNC ERROR'; }
        }
        function renderLeads(groups) {
            const container = document.getElementById('leads-container');
            container.innerHTML = '';
            for (const [cat, leads] of Object.entries(groups)) {
                if (leads.length === 0) continue;
                const block = document.createElement('div');
                block.className = 'category-block';
                block.innerHTML = '<div class="category-header" onclick="this.nextSibling.classList.toggle(\'active\')"><span class="category-name">' + cat + '</span><span class="category-count">' + leads.length + '</span></div><div class="leads-list"></div>';
                const list = block.querySelector('.leads-list');
                leads.forEach(l => list.appendChild(createLeadCard(l)));
                container.appendChild(block);
            }
        }
        function createLeadCard(l) {
            const div = document.createElement('div');
            div.className = 'lead-card';
            div.innerHTML = '<div class="lead-header" onclick="this.nextSibling.nextSibling.nextSibling.nextSibling.classList.toggle(\'active\')"><div class="lead-name">' + l.name + '</div><div class="lead-date">Ingreso: 2026-06-23</div></div><span class="lead-phone">' + l.phone + '</span><div class="lead-circle" onclick="showView(\'circles-view\')">⭕ ' + l.circle + '</div><span class="lead-status">Evolucionando</span><div class="lead-details"><p><strong>Círculo:</strong> ' + l.circle + '</p><p><strong>Status KiteProp:</strong> Activo / En espera</p><p><strong>Base de Datos:</strong> ' + l.full_data + '</p><p><strong>JID:</strong> ' + l.jid + '</p><button style="background:#e74c3c; color:white; border:none; padding:8px; border-radius:5px; margin-top:10px; width:100%" onclick="window.open(\'https://wa.me/' + l.phone.replace('+','') + '\')">Contactar WhatsApp</button></div>';
            return div;
        }
        function toggleSearch() { document.getElementById('search-container').classList.toggle('active'); }
        function handleSearch() {
            const query = document.getElementById('main-search').value.toLowerCase();
            const terms = query.split(' ').filter(t => t.length > 0);
            const filtered = allLeads.filter(l => { return terms.every(t => l.name.toLowerCase().includes(t) || l.category.toLowerCase().includes(t) || l.circle.toLowerCase().includes(t)); });
            const container = document.getElementById('leads-container');
            container.innerHTML = '<div class="category-header"><span class="category-name">Resultados</span><span class="category-count">'+filtered.length+'</span></div>';
            const list = document.createElement('div');
            list.className = 'leads-list active';
            filtered.forEach(l => list.appendChild(createLeadCard(l)));
            container.appendChild(list);
            showView('leads-view');
        }
        function renderCircles() {
            const circles = [...new Set(allLeads.map(l => l.circle))];
            const container = document.getElementById('circles-container');
            container.innerHTML = '';
            circles.forEach(c => {
                const div = document.createElement('div');
                div.className = 'category-header';
                div.style.marginBottom = '10px';
                div.innerHTML = '<span class="category-name">⭕ Círculo ' + c + '</span>';
                container.appendChild(div);
            });
        }
        function showView(viewId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(el) {
                document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }
        function goUp() { document.getElementById('chat-area').scrollTo({top:0, behavior:'smooth'}); }
        loadData();
    </script>
</body>
</html>
