<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA MASTER V5 — INTELLIGENT LEADS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #app-container { height: 100%; display: flex; flex-direction: column; }
        
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; align-items: center; justify-content: space-between; z-index: 1000; position: relative; }
        .nav-group { display: flex; gap: 15px; align-items: center; }
        .header-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #666; transition: 0.2s; }
        .header-btn:active { color: #e74c3c; transform: scale(1.2); }
        #title-container { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
        #header-title { font-weight: bold; color: #e74c3c; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        #cat-menu { background: #0a0a0a; display: flex; overflow-x: auto; padding: 12px 10px; gap: 8px; scrollbar-width: none; border-bottom: 1px solid #222; }
        .cat-item { background: transparent; padding: 6px 14px; border-radius: 15px; font-size: 11px; color: #888; border: 1px solid #333; white-space: nowrap; cursor: pointer; }
        .cat-item.active { color: #e74c3c; border-color: #e74c3c; background: #e74c3c11; }

        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050505; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .category-block { margin-bottom: 15px; }
        .category-header { 
            background: #111; padding: 12px 15px; border-radius: 8px; border-left: 4px solid #e74c3c;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .category-name { font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .category-count { font-size: 10px; background: #333; padding: 2px 8px; border-radius: 10px; }
        
        .leads-list { display: none; padding-top: 8px; }
        .leads-list.active { display: block; }

        .lead-card { background: #1a1a1a; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .lead-name { font-size: 12px; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .lead-phone { font-size: 10px; color: #00d4ff; margin-bottom: 6px; display: block; }
        .lead-info { font-size: 10px; color: #777; line-height: 1.4; }
        
        #input-bar { background: #111; padding: 12px 15px calc(25px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        #text-input { flex: 1; background: transparent; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        
        #sync-status { font-size: 7px; color: #0f8; margin-top: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="nav-group">
                <button class="header-btn" onclick="showView('home-view')">🏠</button>
                <button class="header-btn" onclick="goUp()">↑</button>
                <button class="header-btn" onclick="history.back()">←</button>
            </div>
            <div id="title-container">
                <div id="header-title">Zapia Master V5</div>
                <div id="sync-status">Sincronizando...</div>
            </div>
            <div class="nav-group">
                <button class="header-btn" onclick="history.forward()">→</button>
                <button class="header-btn" onclick="location.reload(true)">↻</button>
            </div>
        </header>

        <nav id="cat-menu">
            <div class="cat-item active" onclick="showView('home-view', this)">🏠 Home</div>
            <div class="cat-item" onclick="showView('leads-view', this)">🎯 Leads</div>
            <div class="cat-item" onclick="showView('socios-view', this)">🤝 Socios</div>
            <div class="cat-item" onclick="showView('fin-view', this)">💰 Financiamiento</div>
            <div class="cat-item" onclick="showView('props-view', this)">🏢 Propiedades</div>
            <div class="cat-item" onclick="showView('circles-view', this)">⭕ Círculos</div>
        </nav>

        <main id="chat-area">
            <div id="home-view" class="view-section active">
                <div style="background:#111; padding:20px; border-radius:12px; border:1px solid #222;">
                    <div style="font-size:16px; font-weight:bold; margin-bottom:10px;">Zapia Macro CRM</div>
                    <div id="stats-summary" style="font-size:12px; color:#888;">Cargando estadísticas reales...</div>
                </div>
            </div>
            <div id="leads-view" class="view-section"><div id="leads-container"></div></div>
            <div id="socios-view" class="view-section"><div style="color:#444; font-size:10px;">Módulo socios activo...</div></div>
            <div id="fin-view" class="view-section"><div style="color:#444; font-size:10px;">Módulo finanzas activo...</div></div>
            <div id="props-view" class="view-section"><div style="color:#444; font-size:10px;">Módulo propiedades activo...</div></div>
            <div id="circles-view" class="view-section"><div style="color:#444; font-size:10px;">Módulo círculos activo...</div></div>
        </main>

        <footer id="input-bar">
            <button class="header-btn">📎</button>
            <input type="text" id="text-input" placeholder="Buscar en la red..." autocomplete="off">
            <button class="header-btn">🎤</button>
            <button class="header-btn" style="color:#e74c3c; font-size:28px">➤</button>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const resp = await fetch('logs.json?v=' + Date.now());
                const data = await resp.json();
                renderLeads(data.leads_v2);
                document.getElementById('sync-status').innerText = 'LIVE: ' + data.last_sync;
            } catch(e) {
                document.getElementById('sync-status').innerText = 'ERROR SYNC';
            }
        }

        function renderLeads(leadsData) {
            const container = document.getElementById('leads-container');
            container.innerHTML = '';
            document.getElementById('stats-summary').innerText = `Total Leads Sincronizados: ${leadsData.stats.total_registros}\nÚltimo barrido de base: ${leadsData.stats.last_update}`;
            const groups = leadsData.groups;
            for (const [cat, leads] of Object.entries(groups)) {
                if (leads.length === 0) continue;
                const block = document.createElement('div');
                block.className = 'category-block';
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `<span class="category-name">${cat}</span><span class="category-count">${leads.length}</span>`;
                header.onclick = () => { block.querySelector('.leads-list').classList.toggle('active'); };
                const list = document.createElement('div');
                list.className = 'leads-list';
                leads.forEach(l => {
                    const card = document.createElement('div');
                    card.className = 'lead-card';
                    card.innerHTML = `<div class="lead-name">${l.name}</div><span class="lead-phone">${l.phone}</span><div class="lead-info">Segmento: ${l.category} | ID: ${l.n}</div>`;
                    list.appendChild(card);
                });
                block.appendChild(header);
                block.appendChild(list);
                container.appendChild(block);
            }
        }

        function showView(viewId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(el) {
                document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }
        function goUp() { document.getElementById('chat-area').scrollTo({top:0, behavior:'smooth'}); }
        loadData();
    </script>
</body>
</html>
