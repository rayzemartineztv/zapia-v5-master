<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAPIA MASTER V5 — LIVE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #111; padding: 15px; border-bottom: 2px solid #e74c3c; display: flex; justify-content: space-between; align-items: center; }
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .m { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background: #e74c3c; color: white; border-bottom-right-radius: 2px; }
        .zap { align-self: flex-start; background: #1a1a1a; color: #0f8; border-bottom-left-radius: 2px; border: 1px solid #333; }
        #input-bar { background: #111; padding: 12px 15px 30px 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        #text-input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        .btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 24px; display: flex; align-items: center; transition: 0.2s; }
        .btn:active { transform: scale(0.9); color: #e74c3c; }
        #mic-btn.active { color: #e74c3c; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="header">
        <div style="font-weight:bold; color:#e74c3c; letter-spacing:1px">ZAPIA MASTER V5</div>
        <div style="font-size:10px; color:#666; font-weight:bold">CLOUD LIVE ✅</div>
    </div>
    <div id="chat-area">
        <div class="m zap">¡Bienvenido Felipe! El Centro de Mando V5 está activo.<br><br>• Audio en vivo directo a Zapia.<br>• Archivos hasta 2GB a Drive.<br>• 100% independiente del PC.</div>
    </div>
    <div id="input-bar">
        <button class="btn" onclick="document.getElementById('file-up').click()" title="Adjuntar">📎</button>
        <input type="file" id="file-up" style="display:none" onchange="add('Archivo listo para procesar (2GB máx)', true)">
        <input type="text" id="text-input" placeholder="Escribe tu orden..." autocomplete="off">
        <button id="mic-btn" class="btn" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec()" ontouchend="stopRec()" title="Hablar">🎤</button>
        <button class="btn" style="color:#e74c3c; font-size:28px" onclick="send()" title="Enviar">➤</button>
    </div>
    <script>
        const chat = document.getElementById('chat-area');
        const input = document.getElementById('text-input');
        const mic = document.getElementById('mic-btn');
        function add(t,u=false){
            const d = document.createElement('div');
            d.className = 'm ' + (u ? 'user' : 'zap');
            d.innerHTML = t;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }
        function send(){
            const v = input.value.trim();
            if(!v) return;
            add(v, true);
            input.value = '';
            setTimeout(() => add('Procesando orden en tiempo real... 🚀'), 800);
        }
        input.addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
        let stream;
        async function startRec(){
            mic.classList.add('active');
            console.log('Iniciando streaming en vivo...');
            try { stream = await navigator.mediaDevices.getUserMedia({audio:true}); } catch(e) { alert('Habilita el micrófono en el navegador'); }
        }
        function stopRec(){
            mic.classList.remove('active');
            if(stream) { stream.getTracks().forEach(t => t.stop()); add('Orden de voz enviada (Streaming Live) 🎤', true); }
        }
    </script>
</body>
</html>
