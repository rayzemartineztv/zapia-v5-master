<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA OS — CRM MASTER v5.7 [LEY N°0]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #app-container { height: 100%; display: flex; flex-direction: column; }
        
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; align-items: center; justify-content: space-between; z-index: 1000; position: relative; }
        .nav-group { display: flex; gap: 15px; align-items: center; }
        .header-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #666; transition: 0.2s; }
        #title-container { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
        #header-title { font-weight: bold; color: #e74c3c; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        #sync-status { font-size: 7px; color: #0f8; margin-top: 2px; text-transform: uppercase; }

        #cat-menu { background: #0a0a0a; display: flex; overflow-x: auto; padding: 12px 10px; gap: 8px; border-bottom: 1px solid #222; }
        .cat-item { background: transparent; padding: 6px 14px; border-radius: 15px; font-size: 11px; color: #888; border: 1px solid #333; white-space: nowrap; cursor: pointer; }
        .cat-item.active { color: #e74c3c; border-color: #e74c3c; background: #e74c3c11; }
        .cat-item.funados-btn { color: #ff4d4d; border-color: #ff4d4d; font-weight: bold; }

        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050505; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-title { font-size: 13px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; color: #e74c3c; }

        .lead-card { background: #1a1a1a; border: 1px solid #222; border-radius: 8px; padding: 12px; margin-bottom: 8px; position: relative; }
        .lead-header { display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
        .lead-name { font-size: 12px; font-weight: bold; color: #fff; }
        .lead-status-pill { font-size: 9px; background: #0f82; color: #0f8; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }
        
        #input-bar { background: #111; padding: 12px 15px calc(25px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        #text-input { flex: 1; background: transparent; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="nav-group"><button class="header-btn">🏠</button></div>
            <div id="title-container"><div id="header-title">Zapia Master v5.7</div><div id="sync-status">ESTRUCTURA BLINDADA</div></div>
            <div class="nav-group"><button class="header-btn" onclick="location.reload(true)">↻</button></div>
        </header>

        <nav id="cat-menu">
            <div class="cat-item active" onclick="showView('home-view', this)">📊 Dashboard</div>
            <div class="cat-item" onclick="showView('leads-view', this)">🎯 Leads</div>
            <div class="cat-item" onclick="showView('prop-view', this)">🏢 Propiedades</div>
            <div class="cat-item" onclick="showView('finance-view', this)">💰 Finanzas</div>
            <div class="cat-item funados-btn" onclick="showView('funados-view', this)">🚩 Funados</div>
        </nav>

        <main id="chat-area">
            <div id="home-view" class="view-section active">
                <div class="card" style="border: 2px solid #e74c3c;"><div class="card-title">Seguridad Estructural</div><div style="font-size:11px; color:#0f8;">LEY N°0: PROTOCOLO PICHICHO ACTIVO.</div></div>
                <div class="card"><div class="card-title">Estado de Operación</div><div style="font-size:10px; color:#aaa;">Data dinámica fluyendo: Arriendos, Ventas, Círculos 360.</div></div>
            </div>
            <div id="leads-view" class="view-section"><div id="leads-container"></div></div>
            <div id="prop-view" class="view-section"><div class="card"><div class="card-title">Check-list Legal</div><div id="prop-container"></div></div></div>
            <div id="finance-view" class="view-section">
                <div class="card"><div class="card-title">💰 Calculadora UF</div><div style="font-size:24px; color:#f1c40f;">$ 37.950,23</div></div>
                <div class="card"><div class="card-title">🏦 Directorio Ejecutivos</div><div id="finance-execs"></div></div>
            </div>
            <div id="funados-view" class="view-section"><div id="funados-container"></div></div>
        </main>

        <footer id="input-bar">
            <button class="header-btn">📎</button>
            <input type="text" id="text-input" placeholder="Zapia OS Master..." autocomplete="off">
            <button class="header-btn" style="color:#e74c3c; font-size:28px">➤</button>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const resp = await fetch('logs.json?v=' + Date.now());
                const data = await resp.json();
                renderLeads(data.leads_v3.groups);
                renderProperties(data.properties || []);
                renderFinance(data.finance || {});
                renderFunados(data.funados || []);
                document.getElementById('sync-status').innerText = 'LEY N°0 LOCKED - ' + data.last_sync;
            } catch(e) { document.getElementById('sync-status').innerText = 'SYNC ERROR'; }
        }

        function renderLeads(groups) {
            const container = document.getElementById('leads-container'); container.innerHTML = '';
            for (const [cat, leads] of Object.entries(groups)) {
                if (leads.length === 0) continue;
                const block = document.createElement('div');
                block.innerHTML = `<div style="background:#1a1a1a; padding:10px; font-size:11px; color:#e74c3c;">${cat} (${leads.length})</div><div class="leads-list"></div>`;
                const list = block.querySelector('.leads-list');
                leads.forEach(l => {
                    const div = document.createElement('div'); div.className = 'lead-card';
                    div.innerHTML = `<div class="lead-header"><div class="lead-name">${l.name}</div><div class="lead-status-pill">Evolución 360</div></div>`;
                    list.appendChild(div);
                });
                container.appendChild(block);
            }
        }

        function renderProperties(props) {
            const container = document.getElementById('prop-container'); container.innerHTML = '';
            const list = props.length > 0 ? props : [{title: "Propiedad Master", value: "UF 2.500", docs: "OK"}];
            list.forEach(p => {
                const div = document.createElement('div'); div.style.padding='10px'; div.style.borderBottom='1px solid #222';
                div.innerHTML = `<div style="font-size:12px; font-weight:bold;">${p.title}</div><div style="font-size:10px; color:#888;">📂 ${p.docs}</div>`;
                container.appendChild(div);
            });
        }

        function renderFinance(fin) {
            const container = document.getElementById('finance-execs'); container.innerHTML = '';
            const execs = fin.execs || [{name: "Andrés González", bank: "Banco Estado", area: "Leasing"}];
            execs.forEach(e => {
                const div = document.createElement('div'); div.className = 'card'; div.style.margin='5px 0';
                div.innerHTML = `<div style="font-size:11px;"><b>${e.name}</b> - ${e.bank} (${e.area})</div>`;
                container.appendChild(div);
            });
        }

        function renderFunados(funados) {
            const container = document.getElementById('funados-container'); container.innerHTML = '<div style="color:#ff4d4d; font-size:11px; margin-bottom:10px;">🚩 LEY N°1</div>';
            funados.forEach(f => {
                const div = document.createElement('div'); div.className = 'lead-card'; div.style.borderColor='#ff4d4d';
                div.innerHTML = `<div class="lead-name">${f.name}</div><div style="font-size:9px; color:#888;">Causa: ${f.reason}</div>`;
                container.appendChild(div);
            });
        }

        function showView(viewId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(el) {
                document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }
        loadData();
    </script>
</body>
</html>
