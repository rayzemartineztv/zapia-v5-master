<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA MASTER V5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        #header { 
            background: #111; 
            padding: 22px 15px; 
            border-bottom: 2px solid #e74c3c; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            z-index: 10;
        }
        #header-title {
            font-weight: bold; 
            color: #e74c3c; 
            letter-spacing: 2px;
            font-size: 18px;
            text-transform: uppercase;
        }

        #refresh-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: #555;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #chat-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #050505; 
        }
        .m { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.4; 
        }
        .user { align-self: flex-end; background: #e74c3c; color: white; border-bottom-right-radius: 2px; }
        .zap { align-self: flex-start; background: #1a1a1a; color: #0f8; border-bottom-left-radius: 2px; border: 1px solid #333; }

        /* BARRA DE ENTRADA CON MARGEN DE SEGURIDAD PARA ANDROID */
        #input-bar { 
            background: #111; 
            padding: 15px 15px 40px 15px; /* Margen inferior extra para evitar pisado de barra Android */
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-top: 1px solid #222;
            z-index: 10;
        }
        #text-input { 
            flex: 1; 
            background: #222; 
            border: 1px solid #444; 
            color: white; 
            padding: 12px 18px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 16px; 
        }
        .btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 24px; display: flex; align-items: center; }
        #mic-btn.active { color: #e74c3c; transform: scale(1.2); }
        
        #build-stamp { 
            position: absolute; 
            top: 2px; 
            right: 5px; 
            font-size: 8px; 
            color: #333; 
        }
    </style>
</head>
<body>
    <div id="build-stamp">30/06/2026 01:48:29</div>
    <header id="header">
        <div id="header-title">Zapia Master V5</div>
        <button id="refresh-btn" onclick="location.reload(true)">↻</button>
    </header>
    <main id="chat-area">
        <div class="m zap">Ajuste de margen aplicado. La barra ahora tiene aire respecto a los botones de navegación de Android.</div>
    </main>
    <footer id="input-bar">
        <button class="btn" onclick="document.getElementById('f-up').click()">📎</button>
        <input type="file" id="f-up" style="display:none">
        <input type="text" id="text-input" placeholder="Escribe tu orden..." autocomplete="off">
        <button id="mic-btn" class="btn">🎤</button>
        <button class="btn" style="color:#e74c3c; font-size:28px" onclick="location.reload()">➤</button>
    </footer>
</body>
</html>
