<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA MASTER V5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; justify-content: center; align-items: center; position: relative; }
        #header-title { font-weight: bold; color: #e74c3c; letter-spacing: 1px; font-size: 15px; text-transform: uppercase; }

        #uf-bar { 
            background: #1a1a1a; 
            padding: 5px 12px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 1px solid #333;
            font-size: 11px;
        }
        .uf-val { color: #0f8; font-weight: bold; }
        
        /* CALCULADORA FLEXIBLE PARA VERTICAL */
        #uf-calc {
            background: #111;
            padding: 8px 10px;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }
        .calc-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .calc-label { font-size: 9px; color: #666; text-align: center; text-transform: uppercase; }
        .calc-input {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 10px 5px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            text-align: center;
        }
        .calc-arrow { color: #e74c3c; font-size: 16px; margin-top: 10px; }

        #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .m { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .zap { align-self: flex-start; background: #1a1a1a; color: #0f8; border-bottom-left-radius: 2px; border: 1px solid #333; }

        #input-bar { background: #111; padding: 10px 15px 35px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222; }
        #text-input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 16px; }
        .btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 22px; display: flex; align-items: center; }
        
        #build-stamp { position: absolute; top: 2px; right: 5px; font-size: 7px; color: #333; }
    </style>
</head>
<body>
    <div id="build-stamp">30/06/2026 02:19:47</div>
    <header id="header"><div id="header-title">Zapia Master V5</div></header>

    <div id="uf-bar">
        <span>UF Hoy: <span class="uf-val">$38,450.75</span></span>
        <span style="font-size:9px; color:#555">30/06/2026</span>
    </div>

    <div id="uf-calc">
        <div class="calc-box">
            <span class="calc-label">UF</span>
            <input type="number" id="input-uf" class="calc-input" placeholder="0.00" oninput="convUFtoCLP(this.value)">
        </div>
        <span class="calc-arrow">⇄</span>
        <div class="calc-box">
            <span class="calc-label">Pesos ($)</span>
            <input type="text" id="input-clp" class="calc-input" placeholder="0" oninput="convCLPtoUF(this.value)">
        </div>
    </div>

    <main id="chat-area">
        <div class="m zap"><b>DISEÑO VERTICAL CORREGIDO</b><br><br>Felipe, he ajustado los anchos para que nada se corte en modo vertical.</div>
    </main>

    <footer id="input-bar">
        <button class="btn">📎</button>
        <input type="text" id="text-input" placeholder="Escribe tu orden..." autocomplete="off">
        <button class="btn">🎤</button>
        <button class="btn" style="color:#e74c3c; font-size:26px">➤</button>
    </footer>

    <script>
        const VALOR_UF = 38450.75;
        function convUFtoCLP(v) {
            const r = v * VALOR_UF;
            document.getElementById('input-clp').value = r ? Math.round(r).toLocaleString('es-CL') : '';
        }
        function convCLPtoUF(v) {
            const c = v.replace(/[^0-9]/g, '');
            const r = c / VALOR_UF;
            document.getElementById('input-uf').value = r ? r.toFixed(2) : '';
        }
    </script>
</body>
</html>
