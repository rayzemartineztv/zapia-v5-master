<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA MASTER V5 — LIVE DATA OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #app-container { height: 100%; display: flex; flex-direction: column; }
        
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; align-items: center; justify-content: space-between; z-index: 1000; position: relative; }
        .nav-group { display: flex; gap: 15px; align-items: center; }
        .header-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #666; transition: 0.2s; }
        .header-btn:active { color: #e74c3c; transform: scale(1.2); }
        #title-container { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
        #header-title { font-weight: bold; color: #e74c3c; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        #cat-menu { background: #0a0a0a; display: flex; overflow-x: auto; padding: 12px 10px; gap: 8px; scrollbar-width: none; border-bottom: 1px solid #222; }
        .cat-item { background: transparent; padding: 6px 14px; border-radius: 15px; font-size: 11px; color: #888; border: 1px solid #333; white-space: nowrap; cursor: pointer; }
        .cat-item.active { color: #e74c3c; border-color: #e74c3c; background: #e74c3c11; }

        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050505; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-title { font-size: 14px; font-weight: bold; color: #fff; }
        
        .item-row { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; border: 1px solid #222; font-size: 12px; color: #ccc; }
        
        .calc-box { background: #1a1a1a; padding: 12px; border-radius: 10px; border: 1px solid #333; margin-top: 10px; }
        .calc-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .calc-input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px 8px; border-radius: 5px; font-size: 14px; text-align: center; min-width: 0; outline: none; }
        @media (max-width: 400px) { .calc-row { flex-direction: column; } }

        #input-bar { background: #111; padding: 12px 15px calc(25px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        #text-input { flex: 1; background: transparent; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        
        #sync-status { font-size: 7px; color: #0f8; margin-top: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="nav-group">
                <button class="header-btn" onclick="showView('home-view')">🏠</button>
                <button class="header-btn" onclick="goUp()">↑</button>
                <button class="header-btn" onclick="history.back()">←</button>
            </div>
            <div id="title-container">
                <div id="header-title">Zapia Master V5</div>
                <div id="sync-status">Sincronizando...</div>
            </div>
            <div class="nav-group">
                <button class="header-btn" onclick="history.forward()">→</button>
                <button class="header-btn" onclick="location.reload(true)">↻</button>
            </div>
        </header>

        <nav id="cat-menu">
            <div class="cat-item active" onclick="showView('home-view', this)">🏠 Home</div>
            <div class="cat-item" onclick="showView('leads-view', this)">🎯 Leads</div>
            <div class="cat-item" onclick="showView('socios-view', this)">🤝 Socios</div>
            <div class="cat-item" onclick="showView('fin-view', this)">💰 Financiamiento</div>
            <div class="cat-item" onclick="showView('props-view', this)">🏢 Propiedades</div>
            <div class="cat-item" onclick="showView('circles-view', this)">⭕ Círculos</div>
        </nav>

        <main id="chat-area">
            <div id="home-view" class="view-section active">
                <div class="card"><div class="card-title" id="welcome-msg">Cargando base de datos real...</div></div>
            </div>
            <div id="leads-view" class="view-section">
                <div class="card"><div class="card-header"><span class="card-title">Leads Reales</span></div><div id="list-leads"></div></div>
            </div>
            <div id="socios-view" class="view-section">
                <div class="card"><div class="card-header"><span class="card-title">Socios Corredores</span></div><div id="list-socios"></div></div>
            </div>
            <div id="fin-view" class="view-section">
                <div class="calc-box">
                    <div class="calc-row">
                        <input type="number" id="val-uf" class="calc-input" placeholder="UF" oninput="calcToCLP()">
                        <input type="number" id="val-clp" class="calc-input" placeholder="PESOS" oninput="calcToUF()">
                    </div>
                    <div id="calc-result" style="font-size:15px; color:#0f8; font-weight:bold; text-align:center; padding:10px;">$ 0</div>
                </div>
                <div class="card"><div class="card-header"><span class="card-title">Ejecutivos Financiamiento</span></div><div id="list-fin"></div></div>
            </div>
            <div id="props-view" class="view-section">
                <div class="card"><div class="card-header"><span class="card-title">Propiedades Propias</span></div><div id="list-props-p"></div></div>
                <div class="card"><div class="card-header"><span class="card-title">Propiedades Socios</span></div><div id="list-props-s"></div></div>
            </div>
            <div id="circles-view" class="view-section">
                <div class="card"><div class="card-header"><span class="card-title">Círculos 360</span></div><div id="list-circles"></div></div>
            </div>
        </main>

        <footer id="input-bar">
            <button class="header-btn">📎</button>
            <input type="text" id="text-input" placeholder="CRM Macro Real Online..." autocomplete="off">
            <button class="header-btn">🎤</button>
            <button class="header-btn" style="color:#e74c3c; font-size:28px">➤</button>
        </footer>
    </div>

    <script>
        let uf = 38450.75;
        let realData = null;

        async function loadData() {
            try {
                const resp = await fetch('logs.json?v=' + Date.now());
                realData = await resp.json();
                renderData();
                document.getElementById('sync-status').innerText = 'LIVE DB: ' + realData.last_sync;
            } catch(e) {
                document.getElementById('sync-status').innerText = 'ERROR SYNC';
            }
        }

        function renderData() {
            document.getElementById('welcome-msg').innerText = 'Base Maestra Sincronizada.';
            const fill = (id, data) => {
                const box = document.getElementById(id);
                box.innerHTML = '';
                if(!data || data.length === 0) { box.innerHTML = '<div class="item-row">Sin datos en esta base</div>'; return; }
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'item-row';
                    div.innerText = item;
                    box.appendChild(div);
                });
            };
            fill('list-leads', realData.leads);
            fill('list-socios', realData.socios);
            fill('list-fin', realData.finanzas);
            fill('list-props-p', realData.propiedades_propias);
            fill('list-props-s', realData.propiedades_socios);
            fill('list-circles', ["Red 360 indexada sobre datos reales", "Traspaso de carteras activo"]);
        }

        function showView(viewId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            if(el) {
                document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }
        function goUp() { document.getElementById('chat-area').scrollTo({top:0, behavior:'smooth'}); }
        function calcToCLP() { const v = document.getElementById('val-uf').value; document.getElementById('calc-result').innerText = '$ ' + Math.round(v*uf).toLocaleString('es-CL'); }
        function calcToUF() { const v = document.getElementById('val-clp').value; document.getElementById('calc-result').innerText = (v/uf).toFixed(2) + ' UF'; }
        
        loadData();
        setInterval(loadData, 30000); 
    </script>
</body>
</html>
