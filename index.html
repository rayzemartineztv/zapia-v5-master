<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA MASTER V5 — FULL OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #app-container { height: 100%; display: flex; flex-direction: column; }
        
        /* HEADER FIJO CON SISTEMA DE NAVEGACIÓN "FLECHAS" */
        #header { background: #111; padding: 15px 10px; border-bottom: 2px solid #e74c3c; display: flex; align-items: center; justify-content: space-between; z-index: 1000; position: relative; }
        .nav-group { display: flex; gap: 15px; align-items: center; }
        .header-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: #666; transition: 0.2s; }
        .header-btn:active { color: #e74c3c; transform: scale(1.2); }
        
        #title-container { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; }
        #header-title { font-weight: bold; color: #e74c3c; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        /* MENÚ PRINCIPAL SUPERIOR */
        #cat-menu { background: #0a0a0a; display: flex; overflow-x: auto; padding: 12px 10px; gap: 8px; border-bottom: 1px solid #222; scrollbar-width: none; }
        .cat-item { background: transparent; padding: 6px 14px; border-radius: 15px; font-size: 11px; color: #888; border: 1px solid #333; white-space: nowrap; cursor: pointer; }
        .cat-item.active { color: #e74c3c; border-color: #e74c3c; background: #e74c3c11; }

        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: #050505; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
        
        /* MÓDULO FINANCIAMIENTO / CALCULADORA */
        .fin-section { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        #uf-bar { background: #e74c3c11; border: 1px solid #e74c3c44; padding: 10px 15px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .uf-label { font-size: 10px; color: #e74c3c; font-weight: bold; }
        .uf-value { font-size: 13px; color: #fff; font-family: monospace; }

        /* CALCULADORA INTERACTIVA */
        .calc-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-top: 10px; }
        .calc-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .calc-input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; font-size: 14px; outline: none; text-align: center; }
        .calc-res { font-size: 16px; color: #0f8; font-weight: bold; text-align: center; padding: 10px; background: #0f811; border-radius: 5px; }

        /* CRM CARDS */
        .exec-card { background: #1a1a1a; border-radius: 8px; padding: 12px; margin-top: 10px; border-left: 3px solid #00d4ff; cursor: pointer; }
        .exec-name { font-size: 13px; color: #fff; font-weight: bold; }

        /* FOOTER DINÁMICO */
        #input-bar { background: #111; padding: 12px 15px calc(25px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #222; }
        #text-input { flex: 1; background: transparent; border: 1px solid #444; color: white; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
    </style>
</head>
<body>
    <div id="app-container">
        <header id="header">
            <div class="nav-group">
                <button class="header-btn" onclick="location.reload()">🏠</button>
                <button class="header-btn" title="Subir nivel" onclick="history.back()">↑</button>
                <button class="header-btn" title="Atrás" onclick="history.back()">←</button>
            </div>
            <div id="title-container">
                <div id="header-title">Zapia Master V5</div>
                <div style="font-size:8px; color:#444">ACT: 30/06/2026 03:11:18</div>
            </div>
            <div class="nav-group">
                <button class="header-btn" title="Adelante" onclick="history.forward()">→</button>
                <button class="header-btn" onclick="location.reload(true)">↻</button>
            </div>
        </header>

        <nav id="cat-menu">
            <div class="cat-item">🎯 Leads</div>
            <div class="cat-item">🤝 Socios</div>
            <div class="cat-item active">💰 Financiamiento</div>
            <div class="cat-item">🏢 Propiedades</div>
            <div class="cat-item">⭕ Círculos</div>
        </nav>

        <main id="chat-area">
            <!-- SECCIÓN FINANCIAMIENTO COMPLETA -->
            <div class="fin-section">
                <div id="uf-bar">
                    <span class="uf-label">REFERENCIA UF</span>
                    <span class="uf-value">$38.450,75</span>
                </div>

                <div class="calc-box">
                    <div style="font-size: 10px; color: #888; margin-bottom: 8px; text-transform: uppercase;">Calculadora Conversora</div>
                    <div class="calc-row">
                        <input type="number" id="val-uf" class="calc-input" placeholder="UF" oninput="calcToCLP()">
                        <input type="number" id="val-clp" class="calc-input" placeholder="PESOS" oninput="calcToUF()">
                    </div>
                    <div id="calc-result" class="calc-res">$ 0</div>
                </div>

                <!-- EJECUTIVOS INDEXADOS (NO ELIMINADOS) -->
                <div class="exec-card">
                    <div class="exec-name">Valentina Ejecutivo (Casa Nuestra)</div>
                    <div style="font-size: 10px; color: #00d4ff;">10 Clientes en Círculos Indexados</div>
                </div>
            </div>
        </main>

        <footer id="input-bar">
            <button class="header-btn">📎</button>
            <input type="text" id="text-input" placeholder="Zapia OS está activo..." autocomplete="off">
            <button class="header-btn">🎤</button>
            <button class="header-btn" style="color:#e74c3c; font-size:28px">➤</button>
        </footer>
    </div>

    <script>
        const uf = 38450.75;
        function calcToCLP() {
            const val = document.getElementById('val-uf').value;
            const res = Math.round(val * uf);
            document.getElementById('calc-result').innerText = '$ ' + res.toLocaleString('es-CL');
        }
        function calcToUF() {
            const val = document.getElementById('val-clp').value;
            const res = (val / uf).toFixed(2);
            document.getElementById('calc-result').innerText = res + ' UF';
        }
    </script>
</body>
</html>
