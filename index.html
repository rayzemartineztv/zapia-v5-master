<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAPIA MASTER V5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* HEADER CENTRADO Y CON AIRE */
        #header { 
            background: #111; 
            padding: 20px 15px; 
            border-bottom: 2px solid #e74c3c; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            z-index: 10;
        }
        #header-title {
            font-weight: bold; 
            color: #e74c3c; 
            letter-spacing: 2px;
            font-size: 18px;
            text-transform: uppercase;
        }

        /* BOTÓN REFRESH CON ONDAS */
        #refresh-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: #555;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .wave {
            position: absolute;
            border: 2px solid rgba(231, 76, 60, 0.5);
            border-radius: 50%;
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple {
            from { width: 0; height: 0; opacity: 1; }
            to { width: 100px; height: 100px; opacity: 0; }
        }

        #chat-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #050505; 
        }
        .m { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 15px; 
            line-height: 1.4; 
        }
        .user { align-self: flex-end; background: #e74c3c; color: white; border-bottom-right-radius: 2px; }
        .zap { align-self: flex-start; background: #1a1a1a; color: #0f8; border-bottom-left-radius: 2px; border: 1px solid #333; }

        /* BARRA DE ENTRADA CORREGIDA PARA TECLADO */
        #input-bar { 
            background: #111; 
            padding: 12px 15px; 
            /* Evita que se pise con la barra de autocompletado/claves */
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-top: 1px solid #222;
            z-index: 10;
        }
        #text-input { 
            flex: 1; 
            background: #222; 
            border: 1px solid #444; 
            color: white; 
            padding: 12px 18px; 
            border-radius: 25px; 
            outline: none; 
            font-size: 16px; 
        }
        #text-input:focus {
            border-color: #e74c3c;
        }
        .btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 24px; display: flex; align-items: center; transition: 0.2s; }
        #mic-btn.active { color: #e74c3c; transform: scale(1.2); }
        
        #build-stamp { 
            position: absolute; 
            top: 2px; 
            right: 5px; 
            font-size: 8px; 
            color: #333; 
            font-family: monospace; 
        }
    </style>
</head>
<body>
    <div id="build-stamp">V5 - 30/06/2026 01:47:01</div>
    
    <header id="header">
        <div id="header-title">Zapia Master V5</div>
        <button id="refresh-btn" onclick="uiRefresh(this)">↻</button>
    </header>

    <main id="chat-area">
        <div class="m zap">Diseño actualizado, Felipe.<br><br>• Header centrado.<br>• Barra de escritura con margen de seguridad para el teclado.<br>• Sello: 30/06/2026 01:47:01</div>
    </main>

    <footer id="input-bar">
        <button class="btn" onclick="document.getElementById('f-up').click()">📎</button>
        <input type="file" id="f-up" style="display:none">
        
        <input type="text" id="text-input" placeholder="Escribe tu orden..." autocomplete="off">
        
        <button id="mic-btn" class="btn">🎤</button>
        <button class="btn" style="color:#e74c3c; font-size:28px" onclick="handleSend()">➤</button>
    </footer>

    <script>
        const chat = document.getElementById('chat-area');
        const input = document.getElementById('text-input');
        const mic = document.getElementById('mic-btn');

        function uiRefresh(btn) {
            const w = document.createElement('div');
            w.className = 'wave';
            btn.appendChild(w);
            setTimeout(() => { window.location.reload(true); }, 500);
        }

        function addMsg(txt, isUser = false) {
            const d = document.createElement('div');
            d.className = 'm ' + (isUser ? 'user' : 'zap');
            d.innerHTML = txt;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function handleSend() {
            const v = input.value.trim();
            if(!v) return;
            addMsg(v, true);
            input.value = '';
            // Aquí iría la lógica de envío a Zapia
            setTimeout(() => addMsg('Recibido. Procesando en vivo...'), 600);
        }

        input.addEventListener('keypress', e => { if(e.key === 'Enter') handleSend(); });

        // Lógica de Micrófono (Push-to-Talk)
        let mediaRec;
        async function startRec() {
            mic.classList.add('active');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRec = new MediaRecorder(stream);
                mediaRec.onstop = () => addMsg('<i>Orden de voz recibida</i> 🎙️', true);
                mediaRec.start();
            } catch(e) { alert('Permite el micrófono para hablar.'); }
        }
        function stopRec() {
            if(mediaRec && mediaRec.state !== 'inactive') {
                mediaRec.stop();
                mic.classList.remove('active');
            }
        }

        mic.addEventListener('mousedown', startRec);
        mic.addEventListener('mouseup', stopRec);
        mic.addEventListener('touchstart', (e) => { e.preventDefault(); startRec(); });
        mic.addEventListener('touchend', (e) => { e.preventDefault(); stopRec(); });

        // Auto-scroll al abrir teclado
        window.addEventListener('resize', () => {
            chat.scrollTop = chat.scrollHeight;
        });
    </script>
</body>
</html>
